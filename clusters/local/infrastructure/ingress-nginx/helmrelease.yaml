apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 5m
  releaseName: ingress-nginx
  targetNamespace: ingress-nginx

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: ingress-nginx
      version: 4.15.1
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system

  values:
    controller:
      replicaCount: 2

      service:
        type: LoadBalancer

      ingressClassResource:
        name: nginx
        enabled: true
        default: true

      allowSnippetAnnotations: false

      config:
        use-forwarded-headers: "true"
        server-tokens: "false"

      serviceAccount:
        create: true
        automountServiceAccountToken: true

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

      metrics:
        enabled: true
        serviceMonitor:
          enabled: false

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: controller

    admissionWebhooks:
      enabled: true
      patch:
        enabled: true
        serviceAccount:
          create: true
          automountServiceAccountToken: true