apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: flux-system
spec:
  interval: 5m
  releaseName: loki
  targetNamespace: monitoring

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: loki
      version: 5.8.4
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  values:
    deploymentMode: singleBinary

    serviceAccount:
      create: true
      automountServiceAccountToken: false

    lokiCanary:
      enabled: false

    gateway:
      enabled: false

    backend:
      enabled: false

    read:
      enabled: false

    write:
      enabled: false

    singleBinary:
      replicas: 1
      terminationGracePeriodSeconds: 60

      persistence:
        enabled: true
        size: 10Gi
        storageClass: nfs-client
        accessModes:
          - ReadWriteOnce

      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi

    loki:
      auth_enabled: false

      commonConfig:
        path_prefix: /var/loki
        replication_factor: 1
        ring:
          kvstore:
            store: inmemory

      server:
        http_listen_port: 3100
        grpc_listen_port: 9095

      storage_config:
        boltdb_shipper:
          active_index_directory: /var/loki/index
          cache_location: /var/loki/index_cache
          shared_store: filesystem
        filesystem:
          directory: /var/loki/chunks

      schemaConfig:
        configs:
          - from: "2020-10-24"
            store: boltdb-shipper
            object_store: filesystem
            schema: v11
            index:
              prefix: index_
              period: 24h

      limits_config:
        retention_period: 168h
        max_entries_limit_per_query: 5000
        ingestion_rate_mb: 8
        ingestion_burst_size_mb: 16
        reject_old_samples: true
        reject_old_samples_max_age: 168h

      compactor:
        working_directory: /var/loki/compactor
        retention_enabled: true
        shared_store: filesystem