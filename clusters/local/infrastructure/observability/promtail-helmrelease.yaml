apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: flux-system
spec:
  interval: 5m
  releaseName: promtail
  targetNamespace: monitoring

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: promtail
      version: 6.15.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  values:
    serviceAccount:
      create: true
      automountServiceAccountToken: true

    podAnnotations:
      sidecar.istio.io/inject: "false"

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 512Mi

    config:
      server:
        http_listen_port: 3101
        grpc_listen_port: 0

      positions:
        filename: /run/promtail/positions.yaml

      clients:
        - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
          batchwait: 1s
          batchsize: 1048576
          timeout: 10s
          external_labels:
            cluster: linode-prod

      limits_config:
        max_line_size: 65536
        readline_rate: 10240
        readline_burst: 10240
        max_streams: 10000

      scrape_configs:
        - job_name: kubernetes-pods
          kubernetes_sd_configs:
            - role: pod

          pipeline_stages:
            - cri: {}

          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
              action: drop
              regex: ^(loki|promtail|grafana)$

            - source_labels: [__meta_kubernetes_namespace]
              action: drop
              regex: ^(kube-system|kube-public|kube-node-lease|cert-manager|istio-system|metallb-system|flux-system|local-path-storage)$

            - source_labels: [__meta_kubernetes_pod_annotation_promtail_ignore]
              action: drop
              regex: true

            - source_labels: [__meta_kubernetes_pod_annotation_kubernetes_io_config_mirror]
              action: drop
              regex: ".+"

            - action: replace
              source_labels: [__meta_kubernetes_namespace]
              target_label: namespace

            - action: replace
              source_labels: [__meta_kubernetes_pod_name]
              target_label: pod

            - action: replace
              source_labels: [__meta_kubernetes_pod_container_name]
              target_label: container

            - action: replace
              source_labels: [__meta_kubernetes_pod_label_app]
              target_label: app

            - action: replace
              source_labels:
                - namespace
                - app
              separator: /
              target_label: job
              replacement: $1/$2

            - action: replace
              source_labels:
                - __meta_kubernetes_pod_uid
                - __meta_kubernetes_pod_container_name
              separator: /
              target_label: __path__
              replacement: /var/log/pods/*$1/*$2/*.log

    extraVolumes:
      - name: varlog
        hostPath:
          path: /var/log

    extraVolumeMounts:
      - name: varlog
        mountPath: /var/log
        readOnly: true