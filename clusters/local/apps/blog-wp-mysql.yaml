apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: blog-mysql
  namespace: flux-system
spec:
  dependsOn:
    - name: blog-namespace
  interval: 10m
  path: ./clusters/local/apps/blog/wp-database
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: wp-sops