apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: blog-wordpress
  namespace: flux-system
spec:
  dependsOn:
    - name: blog-mysql
    - name: infra-ingress-nginx
  interval: 10m
  path: ./clusters/local/apps/blog/wordpress
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: wp-sops